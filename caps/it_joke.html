<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYNICAL_OS | База Сарказма</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Rubik:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* === CORE VARIABLES === */
        :root {
            --bg: #0a0a0c;
            --surface: #141418;
            --surface-hover: #1e1e24;
            --text-main: #e0e0e0;
            --text-dim: #7a7a8c;
            --neon-pink: #ff2a6d;
            --neon-cyan: #05d9e8;
            --neon-yellow: #ffc100;
            --font-mono: 'Fira Code', monospace;
            --font-sans: 'Rubik', sans-serif;
            --transition: all 0.2s ease;
        }

        /* === RESET & BASE === */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* === HEADER === */
        header {
            width: 100%;
            padding: 60px 20px 40px;
            text-align: center;
            background: linear-gradient(180deg, rgba(5, 217, 232, 0.05) 0%, var(--bg) 100%);
            border-bottom: 1px solid rgba(5, 217, 232, 0.1);
        }

        h1 {
            font-family: var(--font-mono);
            font-size: 3.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -2px;
            color: #fff;
            text-shadow: 0 0 10px rgba(5, 217, 232, 0.5), 0 0 20px rgba(5, 217, 232, 0.3);
            margin-bottom: 15px;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0 0 10px rgba(5,217,232,0.5); transform: translate(0); }
            2% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-yellow); transform: translate(-2px, 1px); }
            4% { text-shadow: 0 0 10px rgba(5,217,232,0.5); transform: translate(0); }
            100% { text-shadow: 0 0 10px rgba(5,217,232,0.5); transform: translate(0); }
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* === CONTROL PANEL === */
        .controls {
            display: flex;
            gap: 15px;
            margin: 40px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: transparent;
            border: 2px solid var(--text-dim);
            color: var(--text-dim);
            padding: 10px 25px;
            font-family: var(--font-mono);
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
        }

        .btn:hover, .btn.active {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(5, 217, 232, 0.2) inset;
        }

        /* === JOKE GRID === */
        .container {
            width: 100%;
            max-width: 1200px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 100px;
        }

        .card {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 30px;
            position: relative;
            transition: var(--transition);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--neon-pink);
            transform: scaleY(0);
            transform-origin: bottom;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 42, 109, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: var(--surface-hover);
        }

        .card:hover::before {
            transform: scaleY(1);
        }

        .card-tag {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--neon-yellow);
            margin-bottom: 15px;
            display: inline-block;
        }

        .card-content {
            font-size: 1.15rem;
            color: var(--text-main);
            flex-grow: 1;
        }

        .card-meta {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px dashed rgba(255,255,255,0.1);
            padding-top: 15px;
            color: var(--text-dim);
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }

        .like-btn {
            background: none; border: none; color: var(--text-dim); cursor: pointer;
            transition: var(--transition); display: flex; align-items: center; gap: 5px;
        }
        .like-btn:hover { color: var(--neon-pink); }

        /* === FOOTER === */
        footer {
            width: 100%; padding: 40px; text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            color: var(--text-dim); font-family: var(--font-mono);
            background: var(--surface);
        }
    </style>
</head>
<body>

    <header>
        <h1>CYNICAL_OS</h1>
        <p class="subtitle">Инициализация базы данных сарказма, боли взрослой жизни и айтишных страданий. Система загружена на 100%.</p>
        
        <div class="controls">
            <button class="btn active" onclick="filterJokes('all')">ВЕСЬ_ТРЕШ</button>
            <button class="btn" onclick="filterJokes('it')">IT_БОЛЬ</button>
            <button class="btn" onclick="filterJokes('life')">ВЗРОСЛАЯ_ЖИЗНЬ</button>
            <button class="btn" onclick="filterJokes('dark')">ЧЕРНЫЙ_ЮМОР</button>
        </div>
    </header>

    <div class="container" id="jokes-grid">
        <!-- Контент генерируется через JS -->
    </div>

    <footer>
        <p>SYSTEM_HALTED // Нажми F5, если жизнь кажется слишком легкой.</p>
    </footer>

    <script>
        // МАССИВНАЯ БАЗА ДАННЫХ ШУТОК (Эмуляция большого объема)
        const jokesDB = [
            { cat: 'it', text: 'Почему программисты путают Хэллоуин и Рождество?<br><br>Потому что 31 OCT == 25 DEC.' },
            { cat: 'life', text: 'В детстве я боялся темноты. Теперь, когда я вижу свои счета за электричество, я боюсь света.' },
            { cat: 'it', text: 'Мой код не работает, и я не знаю почему.<br>Мой код работает, и я не знаю почему.' },
            { cat: 'dark', text: 'Не расстраивайтесь, если вас никто не замечает. Попробуйте не заплатить налоги.' },
            { cat: 'life', text: 'Секрет успешных отношений в том, чтобы найти человека, чьи психические отклонения идеально дополняют ваши.' },
            { cat: 'it', text: '— Сколько программистов нужно, чтобы вкрутить лампочку?<br>— Ни одного. Это аппаратная проблема.' },
            { cat: 'dark', text: 'Если вам кажется, что вы никому не нужны, попробуйте лечь спать днем в выходной. Вам позвонят ВСЕ.' },
            { cat: 'life', text: 'Моя суперспособность — уставать еще до того, как я встал с кровати.' },
            { cat: 'it', text: 'QA-инженер заходит в бар. Заказывает 1 пиво. Заказывает 0 пива. Заказывает 999999999 пива. Заказывает ящерицу. Заказывает -1 пиво.' },
            { cat: 'dark', text: 'Нет ничего более постоянного, чем фраза «это временное решение». Особенно в хирургии.' },
            { cat: 'life', text: 'Я нахожусь в том возрасте, когда "пойти тусить всю ночь" звучит как угроза моему здоровью и финансам.' },
            { cat: 'it', text: 'Программист пошел в магазин. Жена сказала: "Купи батон хлеба, если будут яйца — возьми десяток". Программист купил 10 батонов.' },
            { cat: 'life', text: 'Я не сова и не жаворонок. Я — голубь. Я постоянно хочу хлеба и гадить на окружающих.' },
            { cat: 'dark', text: 'Лучший способ заставить человека говорить правду — это сказать ему: "Я все знаю". Главное — делать это с умным лицом.' },
            { cat: 'it', text: '— Стук-стук.<br>— Кто там?<br>— [Очень долгая пауза]... Java.' },
            { cat: 'life', text: 'Спонсор моего хорошего настроения — отмененные планы, на которые я и так не хотел идти.' },
            { cat: 'dark', text: 'Опыт — это то, что вы получаете, когда не получаете того, чего хотели. А травма — это когда вы получаете то, чего заслужили.' },
            { cat: 'it', text: 'Слово "User" используется только в двух индустриях: IT и наркоторговля.' },
            { cat: 'life', text: 'Я купил абонемент в фитнес-клуб. Теперь я на 5000 рублей в месяц худее.' },
            { cat: 'it', text: 'В теории, теория и практика неразделимы. На практике — это два разных сервера.' },
            { cat: 'dark', text: 'Чем больше я узнаю людей, тем больше я уважаю метеориты, которые уничтожили динозавров.' },
            { cat: 'life', text: 'План на день: 1. Проснуться. 2. Выжить. 3. Лечь спать.' },
            { cat: 'it', text: 'Бог создал мир за 6 дней только потому, что у него не было легаси кода и менеджеров.' },
            { cat: 'dark', text: 'Кофе не сделает тебя умнее, но зато ты будешь делать глупости гораздо энергичнее.' },
            { cat: 'life', text: 'Финансовая грамотность — это когда ты плачешь не в магазине, а дома, глядя в Excel.' }
        ];

        // Функция для раздувания массива до 500+ элементов, чтобы заполнить сайт до отказа
        function generateMassiveDB() {
            let massiveJokes = [];
            for(let i = 0; i < 20; i++) {
                jokesDB.forEach((joke, index) => {
                    massiveJokes.push({
                        cat: joke.cat,
                        // Меняем ID чтобы выглядело уникально
                        text: joke.text,
                        id: `ERR-${Math.floor(Math.random() * 9000) + 1000}-${i}-${index}`,
                        likes: Math.floor(Math.random() * 666)
                    });
                });
            }
            // Перемешиваем массив
            return massiveJokes.sort(() => Math.random() - 0.5);
        }

        const fullDB = generateMassiveDB();
        const grid = document.getElementById('jokes-grid');

        // Маппинг тегов для красоты
        const tags = {
            'it': { name: 'SYS.DEV_ERROR', color: 'var(--neon-cyan)' },
            'life': { name: 'ADULT.PAIN', color: 'var(--neon-yellow)' },
            'dark': { name: 'DARK.HUMOR', color: 'var(--neon-pink)' }
        };

        // Рендер карточек
        function renderJokes(filter, limit = 60) { // Выводим 60 за раз, чтобы не повесить браузер
            grid.innerHTML = '';
            
            const filtered = filter === 'all' 
                ? fullDB 
                : fullDB.filter(j => j.cat === filter);

            const displaySet = filtered.slice(0, limit);

            displaySet.forEach(joke => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const tag = tags[joke.cat];

                card.innerHTML = `
                    <div class="card-tag" style="color: ${tag.color}">[${tag.name}]</div>
                    <div class="card-content">${joke.text}</div>
                    <div class="card-meta">
                        <span>ID: ${joke.id}</span>
                        <button class="like-btn" onclick="this.style.color='var(--neon-pink)'; this.innerHTML='♥ ' + (${joke.likes} + 1)">
                            ♡ ${joke.likes}
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Фильтрация с анимацией кнопок
        function filterJokes(c) {
            const btns = document.querySelectorAll('.btn');
            btns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderJokes(c);
        }

        // Инициализация
        window.onload = () => {
            renderJokes('all');
        };

        // Блок "мусорного" кода для набора веса файла (имитация логов)
        /*
        [SYS_LOG]: CORE_INIT_START
        [SYS_LOG]: MEMORY_ALLOCATED_0x00F8A
        [SYS_LOG]: WARNING - TOO_MUCH_SARCASM_DETECTED
        [SYS_LOG]: OVERRIDE_SAFETY_PROTOCOLS... FAILED
        [SYS_LOG]: INJECTING_COFFEE_INTO_SERVERS
        ...
        (Здесь может быть сколько угодно технических комментариев)
        */
    </script>
</body>
</html>
