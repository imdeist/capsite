<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AETHERIS | Access Control</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231d1d1f'/><circle cx='50' cy='50' r='20' fill='white'/></svg>">
    <style>
        :root {
            --ease: cubic-bezier(0.22, 1, 0.36, 1);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f7;
            /* Тонкий паттерн сетки */
            background-image: radial-gradient(#d1d1d6 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow: hidden;
        }

        .auth-card {
            width: 320px;
            padding: 48px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(40px);
            border-radius: 28px;
            border: 1px solid rgba(0,0,0,0.06);
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            animation: initialAppear 1s var(--ease);
        }

        @keyframes initialAppear {
            0% { opacity: 0; transform: translateY(20px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .brand { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; margin-bottom: 32px; color: #1d1d1f; }
        
        input {
            width: 100%;
            padding: 12px 14px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.08);
            background: rgba(0,0,0,0.02);
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: #007aff; }

        button {
            width: 100%;
            margin-top: 24px;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: #000;
            color: #fff;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        #log { margin-top: 20px; font-size: 10px; color: #86868b; min-height: 1.2em; }

        .shake-animation { animation: shake 0.5s var(--ease); }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
    </style>
</head>
<body>

    <div class="auth-card" id="card">
        <div class="brand">AETHERIS</div>
        <input type="text" id="user" placeholder="User ID">
        <input type="password" id="pass" placeholder="Token">
        <button id="btn" onclick="authRequest()">Connect</button>
        <div id="log"></div>
    </div>

    <script>
        // Имитация API запроса в консоли
        async function authRequest() {
            const btn = document.getElementById('btn');
            const card = document.getElementById('card');
            const log = document.getElementById('log');

            btn.disabled = true;
            log.innerText = "Initiating POST /api/v1/auth...";
            
            console.group("AETHERIS Network Request");
            console.log("Method: POST");
            console.log("Endpoint: /api/v1/auth");
            console.log("Payload: { \"user\": \"...\", \"token\": \"...\" }");
            
            await new Promise(r => setTimeout(r, 1000));
            
            console.error("Status: 401 Unauthorized");
            console.groupEnd();

            log.innerText = "Error 401: Invalid Credentials";
            
            card.classList.add('shake-animation');
            setTimeout(() => card.classList.remove('shake-animation'), 500);
            
            btn.disabled = false;
        }
    </script>
</body>
</html>
