<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AETHERIS // NEURAL_GATEWAY_V9</title>
    <style>
        :root {
            --bg: #050505; 
            --panel-bg: rgba(10, 10, 12, 0.7);
            --accent: #3b82f6; 
            --text: #e4e4e7;
            --radius: 24px;
        }

        body {
            margin: 0; 
            background: var(--bg); 
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif; 
            height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center;
            overflow: hidden;
            /* Фон стал статичным, пульсация перенесена на декоративные элементы */
            background: radial-gradient(circle at 50% 50%, #0a0a1a, #050505);
        }

        /* Обертка для центрирования */
        .wrapper {
            position: relative;
            display: grid;
            grid-template-columns: 400px 320px;
            gap: 32px;
            padding: 48px;
            background: var(--panel-bg);
            backdrop-filter: blur(40px);
            border-radius: var(--radius);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        .auth-block { 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
            justify-content: center;
        }

        h1 { font-size: 24px; margin: 0; letter-spacing: -0.5px; }
        p { font-size: 13px; color: #71717a; margin: 0; }

        input {
            width: 100%; 
            background: rgba(0,0,0,0.4); 
            border: 1px solid #27272a;
            padding: 18px; 
            border-radius: 16px; 
            color: white;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus { border-color: var(--accent); outline: none; }

        button {
            padding: 18px; 
            background: var(--accent); 
            border: none; 
            border-radius: 16px;
            color: white; 
            font-weight: 600; 
            cursor: pointer;
            transition: opacity 0.2s;
        }

        /* Консоль с фиксированной шириной */
        .log-block {
            font-family: 'SF Mono', monospace; 
            font-size: 11px;
            color: var(--accent); 
            height: 380px; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .log-entry {
            border-left: 2px solid #1f2937;
            padding-left: 12px;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="auth-block">
        <div>
            <h1>AETHERIS CORE</h1>
            <p>NEURAL_AUTH_GATEWAY</p>
        </div>
        <input type="text" placeholder="IDENTITY_ID">
        <input type="password" placeholder="TOKEN_KEY">
        <button id="btn" onclick="runSequence()">INITIATE_HANDSHAKE</button>
    </div>
    
    <div class="log-block" id="log-area">
        <div class="log-entry">> SYSTEM_READY</div>
    </div>
</div>

<script>
    function addLog(msg) {
        const area = document.getElementById('log-area');
        const line = document.createElement('div');
        line.className = 'log-entry';
        line.innerText = `> ${msg}`;
        area.appendChild(line);
        if(area.children.length > 15) area.removeChild(area.firstChild);
    }

    async function runSequence() {
        const btn = document.getElementById('btn');
        btn.disabled = true;
        btn.style.opacity = '0.5';
        
        const steps = [
            "Syncing neural weights...",
            "Decrypting memory buffers...",
            "Handshake with Node-01...",
            "Checking SHA-256 integrity...",
            "Access Rejected: Invalid Signature"
        ];

        for(let s of steps) {
            addLog(s);
            await new Promise(r => setTimeout(r, 800));
        }
        
        btn.disabled = false;
        btn.style.opacity = '1';
    }
</script>
</body>
</html>
