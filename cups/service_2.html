<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Технические работы</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231d1d1f'/><circle cx='50' cy='50' r='20' fill='white'/></svg>">
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container { text-align: center; }

        .fade-in-text {
            animation: textReveal 2s cubic-bezier(0.2, 0, 0.2, 1) forwards;
            opacity: 0;
        }

        h1 {
            font-size: 2.2em;
            font-weight: 500;
            margin-bottom: 10px;
        }

        p {
            font-size: 1em;
            color: #64748b;
            margin-bottom: 40px;
        }

        .loader-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto;
        }

        /* Белое вращающееся кольцо */
        .ring {
            width: 100%;
            height: 100%;
            border: 2px solid transparent;
            border-top: 2px solid #ffffff; 
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        /* Серое пульсирующее внешнее кольцо */
        .ring-outer {
            position: absolute;
            top: -10px;
            left: -10px;
            width: 100px;
            height: 100px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes textReveal {
            from { opacity: 0; transform: translateY(15px); letter-spacing: -2px; }
            to { opacity: 1; transform: translateY(0); letter-spacing: normal; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.9); opacity: 0.4; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="container fade-in-text">
        <h1>Система на обслуживании</h1>
        <p>Идет синхронизация данных...</p>
        
        <div class="loader-wrapper">
            <div class="ring"></div>
            <div class="ring-outer"></div>
        </div>
    </div>
</body>
</html>
